<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çevrimdışı - Araba Tamircisi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      text-align: center;
    }
    
    .container {
      max-width: 400px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    p {
      font-size: 16px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .wifi-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    }
    
    .retry-btn:active {
      transform: translateY(0);
    }
    
    .tips {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .tips h3 {
      font-size: 14px;
      color: #60a5fa;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .tips ul {
      list-style: none;
      text-align: left;
    }
    
    .tips li {
      font-size: 14px;
      color: #94a3b8;
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .tips li::before {
      content: "•";
      color: #f97316;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wifi-icon">📡</div>
    
    <img src="/icons/icon-192.png" alt="Araba Tamircisi" class="icon" onerror="this.style.display='none'">
    
    <h1>Çevrimdışısınız</h1>
    
    <p>
      İnternet bağlantınız yok gibi görünüyor. 
      Bağlantınızı kontrol edip tekrar deneyin.
    </p>
    
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Tekrar Dene
    </button>
    
    <div class="tips">
      <h3>💡 İpuçları</h3>
      <ul>
        <li>WiFi veya mobil verinizi kontrol edin</li>
        <li>Uçak modunun kapalı olduğundan emin olun</li>
        <li>Sayfayı yenileyerek tekrar bağlanmayı deneyin</li>
        <li>Oyun verileri cihazınızda saklanıyor</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Auto-retry when back online
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
